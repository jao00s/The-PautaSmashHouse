<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauta Smash House</title>
    <link rel="stylesheet" href="css/estilo.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    

<header>
    <nav>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Sobre nós</a></li>
            <li><a href="#">Cardápio</a></li>
            <li><a href="#">Contato</a></li>
        </ul>

        <div class="perfil">
            <i class="fa-solid fa-circle-user"></i>
        </div>
    </nav>
</header>

<main>

<div class="container">

    <div class="login-box">

        <img src="logo.png" alt="Logo" class="logo">

        <h1>Bem-vindo <span>de volta!</span></h1>
        <p>Faça login para continuar.</p>

        <form id="formLogin">

            <label>
                <i class="fa-solid fa-envelope"></i>
                E-mail
            </label>
            <input type="email" id="email" placeholder="seu@email.com">

            <label>
                <i class="fa-solid fa-mobile-screen"></i>
                Número de telefone
            </label>
            <input type="text" id="telefone" placeholder="(14) 99999-9999">

            <label>
                <i class="fa-solid fa-location-dot"></i>
                Localização
            </label>
            <input type="text" id="localizacao" placeholder="Ex: São Paulo, SP">

            <button type="submit">
                ENTRAR
            </button>

            <p class="cadastro">
                Não tem uma conta?
                <a href="#">Cadastre-se</a>
            </p>

        </form>

    </div>

</div>

<div class="localizacao">
    <i class="fa-solid fa-location-dot"></i>
    Nossa Localização

    <p>
        Rua dos smash, 244 - Vila Saborosa, São Paulo - SP
    </p>
</div>

</main>

<script src="script.js"></script>

</body>
</html>

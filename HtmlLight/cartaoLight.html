<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Pauta Smash House</title>

    <link rel="stylesheet" href="../cssLight/cartaoLight.css">

    <link href="https://fonts.googleapis.com/css2?family=Italiana&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
</head>

<body>

    <div class="container">


        <aside class="sidebar">

            <img src="../img/logo.png" alt="Logo" class="logo">

            <nav>
                <a href="CardapioLight.html">Smashes</a>
                <a href="cardapioBebidasLight.html">Bebidas</a>
                <a href="cardapioAcompanhamentosLight.html">Acompanhamentos</a>
            </nav>

        </aside>


        <main class="content">

            <!-- ETAPAS -->
            <div class="steps">

                <div class="step concluido">
                    <span>✓</span>
                    Seu Pedido
                </div>

                <div class="line"></div>

                <div class="step active">
                    <span>2</span>
                    Pagamento
                </div>

            </div>

            <h1>Pagamento</h1>

            <p class="subtitulo">
                Escolha a forma de pagamento
            </p>

            <div class="pagamento-box">

                <h2>Métodos de Pagamento</h2>

                <div class="metodos">

                    <button class="metodo ativo">
                        <i class="fa-regular fa-credit-card"></i>
                        Cartão de Débito
                    </button>

                    <button class="metodo" onclick="window.location.href='./pixLight.html'">
                        <i class="fa-brands fa-pix"></i>
                        Pix
                    </button>

                </div>

                <h2>Dados do Cartão</h2>

                <form id="formPagamento">

                    <label>Número do Cartão</label>
                    <input type="text" id="numero-cartao" placeholder="0000 0000 0000 0000" maxlength="19">

                    <div class="linha-form">

                        <div>
                            <label>Nome do Cartão</label>
                            <input type="text" id="nome-cartao" placeholder="NOME COMPLETO">
                        </div>

                        <div>
                            <label>Validade</label>
                            <input type="text" id="validade" placeholder="MM/AA" maxlength="5">
                        </div>

                        <div>
                            <label>CVV</label>
                            <input type="text" id="cvv" placeholder="000" maxlength="3">
                        </div>

                    </div>

                    <label>Parcelamento</label>

                    <select id="parcelamento">
                        <option>1x sem juros</option>

                    </select>

                </form>

            </div>

            <div class="seguranca">
                <i class="fa-solid fa-lock"></i>
                Seus dados estão protegidos com segurança
            </div>

        </main>

    </div>


    <div class="rodape-pagamento">

        <button id="btn-pagar" onclick="window.location.href='inicioLight.html'">

            <span>Pagar Agora</span>

            <span id="valor-pagamento">
                R$ 0,00
            </span>

            <i class="fa-solid fa-arrow-right"></i>

        </button>

    </div>

    <script src="../js/cartao.js"></script>

</body>

</html>

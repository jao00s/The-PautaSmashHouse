<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pauta Smash House</title>

    <link rel="stylesheet" href="../cssLight/cardapioLight.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
</head>

<body>

    <aside class="sidebar">

        <img src="../img/logo.png" class="logo" alt="Logo">

        <nav class="menu-lateral ">
            <a class="italianaFont stroke" href="CardapioLight.html">smashes</a>
            <a class="italianaFont stroke" href="cardapioBebidasLight.html">bebidas</a>
            <a class="italianaFont stroke" href="cardapioAcompanhamentosLight.html">acompanhamentos</a>
        </nav>

    </aside>

    <main class="content">

        <nav class="top-menu">
            <a class="italianaFont fontMaior" href="inicioLight.html">Início</a>
            <span class="italianaFont fontMaior colorYellow">|</span>
            <a class="italianaFont fontMaior" href="inicioLight.html">Sobre nós</a>
            <span class="italianaFont fontMaior colorYellow">|</span>
            <a class="italianaFont fontMaior" href="CardapioLight.html">Cardápio</a>
            <span class="italianaFont fontMaior colorYellow">|</span>
            <a class="italianaFont fontMaior" href="contatoLight.html">Contato</a>
        </nav>

        <section class="produtos">

            <div class="card">

                <h2 class="nome">
                    Onion rings 8 unidades
                </h2>

                <div class="preco">R$ 15,00</div>

                <img src="../img/oneonringsLight.png" alt="onionRings">

                <button class="btn" onclick="selecionarAcompanhamento('Onion Rings', 15)">
                    Selecionar
                </button>

            </div>

            <div class="card">

                <h2 class="nome">
                    Batata frita com cheedar 350 gramas
                </h2>

                <div class="preco">R$ 25,00</div>

                <img src="../img/comcheedarLight.png" alt="BatataCheddar">

                <button class="btn" onclick="selecionarAcompanhamento('Batata com Cheddar', 25)">
                    Selecionar
                </button>

            </div>

            <div class="card">

                <h2 class="nome">
                    batata frita média 150 gramas
                </h2>

                <div class="preco">R$ 10,00</div>

                <img src="../img/batataLight.png" alt="BatataMedia">

                <button class="btn" onclick="selecionarAcompanhamento('Batata Média', 10)">
                    Selecionar
                </button>


            </div>

        </section>

    </main>
    <script>
        function selecionarAcompanhamento(nome, preco) {

            localStorage.setItem("acompanhamentoNome", nome);
            localStorage.setItem("acompanhamentoPreco", preco);

            const lanche = Number(localStorage.getItem("lanchePreco")) || 0;
            const bebida = Number(localStorage.getItem("bebidaPreco")) || 0;

            const total = lanche + bebida + preco;

            localStorage.setItem("totalPedido", total);

            window.location.href = "cartaoLight.html";
        }
    </script>

    <script src="../js/cardapio.js"></script>

</body>

</html>
